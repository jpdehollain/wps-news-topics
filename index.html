<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 1 News Topics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%); font-family: system-ui, sans-serif; padding: 24px 16px; display: flex; justify-content: center; }
  .container { max-width: 480px; width: 100%; }
  .header { text-align: center; margin-bottom: 24px; }
  .header .emoji { font-size: 40px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #1e3a5f; margin: 8px 0 4px; }
  .header p { color: #64748b; font-size: 14px; }
  .card { background: white; border-radius: 16px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card .label { font-size: 13px; color: #94a3b8; font-weight: 500; }
  .card .value { font-size: 16px; font-weight: 600; color: #1e3a5f; margin-top: 2px; }
  .current-topic { border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 2px solid; }
  .current-topic.free { background: #fef9c3; border-color: #fde047; }
  .current-topic.set { background: #dbeafe; border-color: #93c5fd; }
  .current-topic .week-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .current-topic.free .week-label { color: #854d0e; }
  .current-topic.set .week-label { color: #1e40af; }
  .current-topic .topic-text { font-size: 17px; font-weight: 600; line-height: 1.5; }
  .current-topic.free .topic-text { color: #713f12; }
  .current-topic.set .topic-text { color: #1e3a5f; }
  .section-title { font-size: 14px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
  .topic-row { background: white; border-radius: 12px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 8px; border: 2px solid transparent; }
  .topic-row.current.free { background: #fef9c3; border-color: #fde047; }
  .topic-row.current.set { background: #dbeafe; border-color: #93c5fd; }
  .topic-row .week { min-width: 56px; font-size: 12px; font-weight: 700; color: #94a3b8; padding-top: 2px; }
  .topic-row.current .week { color: #1e40af; }
  .topic-row .text { font-size: 14px; color: #334155; line-height: 1.5; flex: 1; }
  .arrow { font-size: 18px; margin-left: auto; }
  .neutral { background: white; border-radius: 16px; padding: 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); color: #64748b; margin-bottom: 16px; }
  .error { background: #fee2e2; border-radius: 16px; padding: 20px; text-align: center; color: #991b1b; margin-bottom: 16px; font-size: 14px; }
  .footer { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="emoji">🎒</div>
    <h1 id="app-title">Stage 1 News Topics</h1>
    <p id="app-subtitle"></p>
  </div>
  <div class="card">
    <div class="label">TODAY</div>
    <div class="value" id="today-date"></div>
  </div>
  <div id="current-topic-container"></div>
  <div class="section-title">All Topics</div>
  <div id="all-topics"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
function parseDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function getCurrentTopic(weeks, now) {
  for (let i = weeks.length - 1; i >= 0; i--) {
    if (now >= parseDate(weeks[i].weekStart)) return weeks[i];
  }
  return null;
}

function render(data) {
  const { school, stage, term, weeks } = data;
  const now = new Date();

  // Sort weeks by date just in case
  weeks.sort((a, b) => parseDate(a.weekStart) - parseDate(b.weekStart));

  const termStart = parseDate(weeks[0].weekStart);
  const lastWeekStart = parseDate(weeks[weeks.length - 1].weekStart);
  const termEnd = new Date(lastWeekStart.getFullYear(), lastWeekStart.getMonth(), lastWeekStart.getDate() + 6);

  document.getElementById("app-title").textContent = `${stage} News Topics`;
  document.getElementById("app-subtitle").textContent = `${school} · ${term}`;
  document.getElementById("today-date").textContent = now.toLocaleDateString("en-AU", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  document.getElementById("footer").textContent = `Topics from ${school} ${stage} letter, ${term}`;

  const container = document.getElementById("current-topic-container");
  const current = getCurrentTopic(weeks, now);

  if (now < termStart) {
    container.innerHTML = `<div class="neutral">Term hasn't started yet! First topic week begins ${termStart.toLocaleDateString("en-AU", { day: "numeric", month: "long" })}.</div>`;
  } else if (now > termEnd) {
    container.innerHTML = `<div class="neutral">Term has finished! Great work this term. 🎉</div>`;
  } else if (current) {
    container.innerHTML = `
      <div class="current-topic ${current.free ? 'free' : 'set'}">
        <div class="week-label">${current.label} · This week's topic</div>
        <div class="topic-text">${current.free ? '🎉 ' : ''}${current.topic}</div>
      </div>`;
  }

  const allDiv = document.getElementById("all-topics");
  weeks.forEach(t => {
    const isCurrent = current && t.weekStart === current.weekStart;
    const row = document.createElement("div");
    row.className = `topic-row ${isCurrent ? 'current ' + (t.free ? 'free' : 'set') : ''}`;
    row.innerHTML = `
      <div class="week">${t.label}</div>
      <div class="text">${t.free ? '🎉 ' : ''}${t.topic}</div>
      ${isCurrent ? '<div class="arrow">👈</div>' : ''}
    `;
    allDiv.appendChild(row);
  });
}

// Fetch topics.json (works on GitHub Pages; also works locally if served)
fetch("topics.json")
  .then(r => {
    if (!r.ok) throw new Error("Could not load topics.json");
    return r.json();
  })
  .then(render)
  .catch(err => {
    document.getElementById("current-topic-container").innerHTML =
      `<div class="error">⚠️ Could not load topics.json.<br>Make sure the file is in the same folder as index.html.<br><small>${err.message}</small></div>`;
  });
</script>
</body>
</html>
